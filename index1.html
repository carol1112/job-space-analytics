<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose Portal | Job Space Link</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<link rel="stylesheet" href="jobspacelink.css" />

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins","Segoe UI",sans-serif;
}

html,body{
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(14,165,233,0.75), transparent 32%),
    radial-gradient(circle at 80% 25%, rgba(139,92,246,0.55), transparent 34%),
    radial-gradient(circle at 50% 90%, rgba(0,198,255,0.28), transparent 35%),
    linear-gradient(135deg,#020617,#0f172a 45%,#1e1b4b);
  color:#e5e7eb;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
  pointer-events:none;
}

/* ============================================================
   HEADER - SAME FORMAT AS INDEX
============================================================ */
:root{ --header-h:78px; }

/* ============================================================
   HEADER - COMPRESSED
=========================================================== */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--header-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 16px 0 8px;
  background:rgba(15,23,42,0.92);
  border-bottom:1px solid rgba(59,130,246,0.28);
  backdrop-filter:blur(14px);
  box-shadow:0 8px 24px rgba(0,0,0,0.18);
  z-index:1500;
}

header .logo{
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  margin-left: -4px;
  min-width: 140px;
}

header .logo img{
  height: 100px;
  width: auto;
  max-width: 180px;
  display: block;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(0,198,255,0.45));
}
header nav{
  flex:1 1 auto;
  min-width:0;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  margin-left:4px;
  white-space:nowrap;
}

header nav > a,
header nav .nav-main-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:36px;
  padding:0 4px;
  color:#e5e7eb;
  text-decoration:none;
  font-size:0.88rem;
  font-weight:600;
  transition:color 0.25s ease, text-shadow 0.25s ease;
}

header nav > a:hover,
header nav .nav-main-link:hover{
  color:#ffffff;
  text-shadow:0 0 12px rgba(0,198,255,0.55);
}

header .auth-buttons{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  white-space:nowrap;
}

header .auth-buttons a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  height:36px;
  padding:0 11px;
  border-radius:10px;
  text-decoration:none;
  font-size:0.82rem;
  font-weight:700;
  color:#ffffff;
  border:1px solid rgba(255,255,255,0.14);
  background:linear-gradient(135deg, rgba(0,198,255,0.22), rgba(139,92,246,0.22));
  box-shadow:0 0 14px rgba(0,198,255,0.10);
  transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

header .auth-buttons a:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(0,198,255,0.22);
  border-color:rgba(0,198,255,0.35);
}

.nav-toggle{
  display:none;
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg, rgba(0,198,255,0.22), rgba(139,92,246,0.22));
  color:#fff;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex:0 0 auto;
  border:1px solid rgba(255,255,255,0.14);
  box-shadow:0 0 14px rgba(0,198,255,0.10);
}

.nav-toggle i{
  font-size:1rem;
}

/* Mobile panel */
.mobile-panel{
  position:fixed;
  top:var(--header-h);
  left:0;
  right:0;
  background:rgba(15,23,42,0.97);
  border-top:1px solid rgba(59,130,246,0.25);
  border-bottom:1px solid rgba(59,130,246,0.25);
  box-shadow:0 10px 28px rgba(0,0,0,0.28);
  backdrop-filter:blur(12px);
  padding:14px 16px 18px;
  transform:translateY(-10px);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease, transform 0.25s ease;
  z-index:1400;
}

.mobile-panel.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.mobile-panel .mnav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.mobile-panel .mnav a{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  text-decoration:none;
  color:#e5e7eb;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  font-weight:600;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-panel .mnav a:hover{
  background:rgba(0,198,255,0.12);
  color:#fff;
  transform:translateX(3px);
}

.mobile-panel .mnav-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.mobile-panel .mnav-row{
  display:flex;
  align-items:center;
  gap:8px;
}

.mobile-panel .mnav-main-link{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  text-decoration:none;
  color:#e5e7eb;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  font-weight:600;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-panel .mnav-main-link:hover{
  background:rgba(0,198,255,0.12);
  color:#fff;
  transform:translateX(3px);
}

.mobile-panel .mnav-toggle{
  flex:0 0 48px;
  width:48px;
  min-width:48px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:#e5e7eb;
  font-weight:600;
  font-size:0.96rem;
  cursor:pointer;
  transition:background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-panel .mnav-toggle:hover{
  background:rgba(0,198,255,0.12);
  color:#fff;
  transform:translateX(3px);
}

.mobile-panel .mnav-toggle .mnav-toggle-left{
  display:inline-flex;
  align-items:center;
  gap:12px;
}

.mobile-panel .mnav-toggle .mnav-caret{
  transition:transform 0.25s ease;
}

.mobile-panel .mnav-group.open .mnav-toggle .mnav-caret{
  transform:rotate(180deg);
}

.mobile-panel .mnav-submenu{
  display:none;
  flex-direction:column;
  gap:8px;
  padding-left:14px;
}

.mobile-panel .mnav-group.open .mnav-submenu{
  display:flex;
}

.mobile-panel .mnav-submenu a{
  background:rgba(255,255,255,0.03);
}

/* ============================================================
   ABOUT NAV FIX
=========================================================== */
.nav-dropdown{
  position:relative;
  display:inline-flex;
  align-items:center;
  height:36px;
  flex:0 0 auto;
}

.nav-dropdown-trigger{
  display:inline-flex;
  align-items:center;
  gap:2px;
  height:100%;
}

.nav-main-link{
  display:inline-flex;
  align-items:center;
  text-decoration:none;
}

.nav-dropdown-toggle{
  appearance:none;
  -webkit-appearance:none;
  border:none;
  outline:none;
  background:transparent;
  color:#ffffff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;
  height:24px;
  padding:0;
  margin:0;
  line-height:1;
}

.nav-dropdown-toggle i{
  pointer-events:none;
  color:#ffffff;
  font-size:0.9rem;
}

.nav-dropdown-menu{
  position:absolute;
  top:calc(100% + 12px);
  left:0;
  min-width:220px;
  display:none;
  flex-direction:column;
  gap:0;
  padding:10px 0;
  border-radius:14px;
  background:rgba(15,23,42,0.96);
  border:1px solid rgba(59,130,246,0.35);
  box-shadow:0 12px 34px rgba(0,0,0,0.35);
  backdrop-filter:blur(12px);
  z-index:1200;
}

.nav-dropdown.open .nav-dropdown-menu{
  display:flex;
}

.nav-dropdown-menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  color:#e5e7eb;
  text-decoration:none;
  white-space:nowrap;
  transition:background 0.25s ease, color 0.25s ease;
}

.nav-dropdown-menu a:hover{
  background:rgba(0,198,255,0.12);
  color:#ffffff;
}

.nav-dropdown-menu i{
  width:18px;
  text-align:center;
}

/* ============================================================
   PAGE CONTENT
============================================================ */
.page-shell{
  width:min(1180px, 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2;
  margin:0 auto;
  padding:132px 24px 44px;
}

.portal-card{
  width:100%;
  border-radius:30px;
  border:1.5px solid rgba(59,130,246,0.38);
  background:
    radial-gradient(circle at 20% 15%, rgba(0,198,255,0.14), transparent 35%),
    radial-gradient(circle at 80% 20%, rgba(139,92,246,0.16), transparent 38%),
    rgba(15,23,42,0.84);
  backdrop-filter:blur(18px);
  box-shadow:
    0 0 38px rgba(59,130,246,0.22),
    0 28px 70px rgba(2,6,23,0.58);
  padding:52px 34px;
  overflow:hidden;
  position:relative;
}

.portal-card::before{
  content:"";
  position:absolute;
  width:360px;
  height:360px;
  border-radius:999px;
  background:rgba(0,198,255,0.10);
  filter:blur(10px);
  top:-190px;
  left:-130px;
  pointer-events:none;
}

.portal-card::after{
  content:"";
  position:absolute;
  width:390px;
  height:390px;
  border-radius:999px;
  background:rgba(139,92,246,0.12);
  filter:blur(10px);
  bottom:-210px;
  right:-130px;
  pointer-events:none;
}

.portal-content{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  justify-content:center;
  gap:34px;
}

.portal-button{
  min-height:118px;
  width:100%;
  max-width:330px;
  justify-self:center;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:24px 28px;
  border-radius:24px;
  border:1.5px solid rgba(255,255,255,0.16);
  color:#ffffff;
  text-decoration:none;
  font-size:1.25rem;
  font-weight:900;
  letter-spacing:.02em;
  background:
    linear-gradient(135deg, rgba(0,198,255,0.92), rgba(139,92,246,0.92));
  box-shadow:
    0 0 26px rgba(0,198,255,0.22),
    inset 0 1px 0 rgba(255,255,255,0.20);
  transition:
    transform .25s ease,
    box-shadow .25s ease,
    border-color .25s ease,
    filter .25s ease;
  position:relative;
  overflow:hidden;
}

.portal-button::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.20), transparent);
  transform:translateX(-120%);
  transition:transform .65s ease;
}

.portal-button:hover::before{
  transform:translateX(120%);
}

.portal-button:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(0,198,255,0.46);
  box-shadow:
    0 0 34px rgba(0,198,255,0.36),
    0 22px 36px rgba(2,6,23,0.42);
  filter:saturate(1.08);
}

.portal-button i,
.portal-button span{
  position:relative;
  z-index:2;
}

.portal-button i{
  font-size:1.65rem;
}

.logo-center{
  width:280px;
  min-height:280px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:14px;
  padding:28px;
  background:
    radial-gradient(circle at 35% 25%, rgba(0,198,255,0.22), transparent 42%),
    rgba(2,6,23,0.58);
  border:1.5px solid rgba(96,165,250,0.42);
  box-shadow:
    0 0 0 10px rgba(0,198,255,0.045),
    0 0 34px rgba(0,198,255,0.22),
    inset 0 0 24px rgba(255,255,255,0.04);
  position:relative;
}

.logo-center::before{
  content:"";
  position:absolute;
  inset:-12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.10);
  pointer-events:none;
}

.logo-img{
  width:190px;
  max-width:100%;
  height:auto;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 0 16px rgba(0,198,255,0.42));
}

.logo-fallback{
  display:none;
  text-align:center;
}

.logo-fallback .brand-main{
  display:block;
  font-size:2rem;
  font-weight:950;
  color:#ffffff;
  line-height:1;
  text-shadow:0 0 16px rgba(0,198,255,0.55);
}

.logo-fallback .brand-sub{
  display:block;
  margin-top:8px;
  font-size:1.05rem;
  font-weight:800;
  color:#7dd3fc;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.page-title{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  width:100%;
  padding:0 18px;
}

.page-title h1{
  font-size:clamp(1.35rem, 3vw, 2.1rem);
  color:#ffffff;
  font-weight:950;
  text-shadow:0 0 20px rgba(0,198,255,0.32);
}

.page-title p{
  margin-top:8px;
  font-size:.95rem;
  color:#cbd5e1;
  line-height:1.5;
}


/* SKIP LINK BELOW PORTAL CHOICES */
.skip-now-wrap{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:30px;
  width:100%;
}

.skip-now-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  color:#dbeafe;
  text-decoration:none;
  font-size:0.98rem;
  font-weight:800;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(96,165,250,0.32);
  background:rgba(15,23,42,0.48);
  box-shadow:0 0 16px rgba(0,198,255,0.10);
  transition:
    transform 0.22s ease,
    color 0.22s ease,
    background 0.22s ease,
    border-color 0.22s ease,
    box-shadow 0.22s ease;
}

.skip-now-link:hover,
.skip-now-link:focus-visible{
  color:#ffffff;
  background:rgba(0,198,255,0.12);
  border-color:rgba(56,189,248,0.52);
  box-shadow:0 0 22px rgba(0,198,255,0.20);
  transform:translateY(-2px);
  outline:none;
}

.skip-now-link i{
  color:#38bdf8;
  font-size:0.9rem;
}

/* ============================================================
   RESPONSIVE
============================================================ */
@media (max-width:1023px){
  header{
    min-height:68px;
    padding:8px 12px;
  }

  header .logo img{
    height:62px;
  }

  header nav,
  header .auth-buttons{
    display:none;
  }

  .nav-toggle{
    display:flex;
  }

  .mobile-panel{
    top:68px;
  }

  .page-shell{
    padding:108px 16px 34px;
  }

  .portal-card{
    padding:118px 20px 34px;
    border-radius:24px;
  }

  .portal-content{
    grid-template-columns:1fr;
    gap:22px;
  }

  .logo-center{
    order:1;
    width:220px;
    min-height:220px;
    justify-self:center;
  }

  .logo-img{
    width:155px;
  }

  .jobseeker-btn{
    order:2;
  }

  .employer-btn{
    order:3;
  }

  .portal-button{
    max-width:420px;
    min-height:86px;
    font-size:1.08rem;
    border-radius:20px;
  }
}

@media (max-width:480px){
  .portal-card{
    padding:112px 14px 26px;
  }

  .page-title{
    top:24px;
  }

  .page-title p{
    font-size:.82rem;
  }

  .logo-center{
    width:190px;
    min-height:190px;
    padding:22px;
  }

  .logo-img{
    width:135px;
  }

  .portal-button{
    min-height:76px;
    padding:18px 20px;
    font-size:.98rem;
  }

  .portal-button i{
    font-size:1.35rem;
  }
}


/* ============================================================
   FINAL HEADER RESPONSIVE PATCH
   Exact requested breakpoints
============================================================ */

/* ===== 1800px and above ===== */
@media (min-width: 1800px){
  :root{ --header-h:84px !important; }

  header{
    height:var(--header-h) !important;
    gap:18px !important;
    padding:0 24px 0 14px !important;
  }

  header .logo{
    margin-left:-2px !important;
  }

  header .logo img{
    height:88px !important;
  }

  header nav{
    display:flex !important;
    flex:1 1 auto !important;
    min-width:0 !important;
    align-items:center !important;
    justify-content:flex-start !important;
    gap:20px !important;
    margin-left:10px !important;
    white-space:nowrap !important;
  }

  header nav > a,
  header nav .nav-main-link{
    height:38px !important;
    padding:0 5px !important;
    font-size:0.94rem !important;
  }

  .nav-dropdown{
    height:38px !important;
  }

  .nav-dropdown-trigger{
    gap:2px !important;
  }

  .nav-dropdown-toggle{
    width:24px !important;
    height:24px !important;
  }

  .nav-dropdown-toggle i{
    font-size:0.92rem !important;
  }

  header .auth-buttons{
    display:flex !important;
    gap:10px !important;
  }

  header .auth-buttons a{
    height:38px !important;
    padding:0 14px !important;
    font-size:0.86rem !important;
    border-radius:10px !important;
  }

  .nav-toggle{ display:none !important; }
  .mobile-panel{ display:none !important; }
}

/* ===== 1440px to 1799px ===== */
@media (min-width: 1440px) and (max-width: 1799px){
  :root{ --header-h:78px !important; }

  header{
    height:var(--header-h) !important;
    gap:14px !important;
    padding:0 18px 0 10px !important;
  }

  header .logo{
    margin-left:-3px !important;
  }

  header .logo img{
    height:80px !important;
  }

  header nav{
    display:flex !important;
    flex:1 1 auto !important;
    min-width:0 !important;
    align-items:center !important;
    justify-content:flex-start !important;
    gap:15px !important;
    margin-left:7px !important;
    white-space:nowrap !important;
  }

  header nav > a,
  header nav .nav-main-link{
    height:36px !important;
    padding:0 4px !important;
    font-size:0.84rem !important;
  }

  .nav-dropdown{
    height:36px !important;
  }

  .nav-dropdown-toggle{
    width:24px !important;
    height:24px !important;
  }

  .nav-dropdown-toggle i{
    font-size:0.88rem !important;
  }

  header .auth-buttons{
    display:flex !important;
    gap:7px !important;
  }

  header .auth-buttons a{
    height:36px !important;
    padding:0 11px !important;
    font-size:0.79rem !important;
    border-radius:10px !important;
  }

  .nav-toggle{ display:none !important; }
  .mobile-panel{ display:none !important; }
}

/* ===== 1024px to 1439px ===== */
@media (min-width: 1024px) and (max-width: 1439px){
  :root{ --header-h:76px !important; }

  header{
    height:var(--header-h) !important;
    gap:9px !important;
    padding:0 12px 0 6px !important;
  }

  header .logo{
    margin-left:-2px !important;
  }

  header .logo img{
    height:66px !important;
  }

  header nav{
    display:flex !important;
    flex:1 1 auto !important;
    min-width:0 !important;
    align-items:center !important;
    justify-content:flex-start !important;
    gap:9px !important;
    margin-left:3px !important;
    white-space:nowrap !important;
  }

  header nav > a,
  header nav .nav-main-link{
    height:34px !important;
    padding:0 2px !important;
    font-size:0.75rem !important;
  }

  .nav-dropdown{
    height:34px !important;
  }

  .nav-dropdown-trigger{

   video behavior, and responsive breakpoints.

  --bank-link:#0057b8;

*::after{

}

html,
body{
  background:var(--bank-white) !important;
  color:var(--bank-text) !important;
}

body{
  background:var(--bank-white) !important;
}

body::before{
  display:none !important;
  content:none !important;
}

/* Header background and typography only */
header{
  background:var(--bank-white) !important;

header nav .nav-main-link::before{

  background:transparent !important;

header nav > a:hover,
header nav > a:focus-visible,
header nav .nav-main-link:hover,
header nav .nav-main-link:focus-visible,
.nav-dropdown.open .nav-main-link{
  color:#000000 !important;

  border-color:transparent !important;
  box-shadow:none !important;
  text-shadow:none !important;

  text-underline-offset:4px !important;

<script>

/* ============================================================
   ABOUT DROPDOWN (Desktop)
=========================================================== */
(function(){
  const dd = document.getElementById("aboutNavDropdown");
  const toggle = document.getElementById("aboutNavToggle");
  const menu = document.getElementById("aboutNavMenu");

  if(!dd || !toggle || !menu) return;

  function closeAboutMenu(){
    dd.classList.remove("open");
    toggle.setAttribute("aria-expanded", "false");
  }

  function openAboutMenu(){
    dd.classList.add("open");
    toggle.setAttribute("aria-expanded", "true");
  }

  toggle.addEventListener("click", function(e){
    e.preventDefault();
    e.stopPropagation();

    const isOpen = dd.classList.contains("open");
    if(isOpen){
      closeAboutMenu();
    }else{
      openAboutMenu();
    }
  });

  document.addEventListener("click", function(e){
    if(!dd.contains(e.target)){
      closeAboutMenu();
    }
  });

  document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
      closeAboutMenu();
    }
  });

  const aboutLink = document.getElementById("aboutNavLink");

  if(aboutLink){
    aboutLink.addEventListener("click", function(){
      closeAboutMenu();
    });
  }

  menu.querySelectorAll("a").forEach(function(a){
    a.addEventListener("click", function(){
      closeAboutMenu();
    });
  });
})();

/* ============================================================
   EMPLOYER DROPDOWN (Desktop)
=========================================================== */
(function(){
  const wrap = document.getElementById("employerDropdown");
  const toggle = document.getElementById("employerToggle");
  const menu = document.getElementById("employerMenu");
  if(!wrap || !toggle || !menu) return;

  toggle.addEventListener("click", (e)=>{
    e.preventDefault();
    wrap.classList.toggle("open");
  });

  document.addEventListener("click", (e)=>{
    if(!wrap.contains(e.target)) wrap.classList.remove("open");
  });

  document.addEventListener("keydown", (e)=>{
    if(e.key === "Escape") wrap.classList.remove("open");
  });

  menu.querySelectorAll("a").forEach(a =>
    a.addEventListener("click", ()=> wrap.classList.remove("open"))
  );
})();

/* ============================================================
   MOBILE MENU
=========================================================== */
(function(){
  const btn = document.getElementById("navToggle");
  const panel = document.getElementById("mobilePanel");
  const aboutGroup = document.getElementById("mobileAboutGroup");
  const aboutToggle = document.getElementById("mobileAboutToggle");
  if(!btn || !panel) return;

  function closeAbout(){
    if(!aboutGroup || !aboutToggle) return;
    aboutGroup.classList.remove("open");
    aboutToggle.setAttribute("aria-expanded", "false");
  }

  function toggleAbout(){
    if(!aboutGroup || !aboutToggle) return;
    const open = aboutGroup.classList.toggle("open");
    aboutToggle.setAttribute("aria-expanded", open ? "true" : "false");
  }

  function close(){
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden","true");
    btn.setAttribute("aria-expanded","false");
    closeAbout();
  }

  btn.addEventListener("click", ()=>{
    const open = panel.classList.toggle("open");
    panel.setAttribute("aria-hidden", open ? "false" : "true");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    if(!open) closeAbout();
  });

  if(aboutToggle){
    aboutToggle.addEventListener("click", (e)=>{
      e.preventDefault();
      e.stopPropagation();
      toggleAbout();
    });
  }

  panel.querySelectorAll("a").forEach(a => a.addEventListener("click", close));
  document.addEventListener("keydown", (e)=>{
    if(e.key === "Escape") close();
  });

  document.addEventListener("click", (e)=>{
    if(panel.classList.contains("open")){
      const header = document.querySelector("header");
      if(header && header.contains(e.target)) return;
      if(panel.contains(e.target)) return;
      close();
    }
  });

  window.addEventListener("resize", ()=>{
    if(window.innerWidth >= 769) close();
  }, { passive:true });
})();
</script>
